# Codecov configuration for consul-esm.
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    project:
      default:
        informational: true   # never block PRs on coverage drop
    patch:
      default:
        informational: true

ignore:
  - "**/*_test.go"
  - "**/mocks/**"
  - "**/mock_*"
  - "version/**"
