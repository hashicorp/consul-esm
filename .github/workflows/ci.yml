name: ci

on:
  push:
  pull_request:

jobs:
  run-tests:
    name: Run test cases
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          # Derive the Go version from go.mod so the test job always matches the
          # module's required toolchain (avoids GOTOOLCHAIN=local failures on bumps).
          go-version-file: go.mod

      - name: Install Consul for integration testing
        env:
          # Latest CE version — pinned so CI uses a known-good release.
          # ENT versions need CONSUL_LICENSE and can't be used here.
          CONSUL_VERSION: "2.0.0"
        run: |
          curl -sSLO "https://releases.hashicorp.com/consul/${CONSUL_VERSION}/consul_${CONSUL_VERSION}_linux_amd64.zip"
          unzip -o "consul_${CONSUL_VERSION}_linux_amd64.zip" consul -d /usr/local/bin
          rm "consul_${CONSUL_VERSION}_linux_amd64.zip"
          consul version

      - name: Run tests with coverage
        run: go test -timeout=60s -p 1 -coverprofile=coverage.txt -covermode=set ./...

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: esm-coverage
          path: coverage.txt
          if-no-files-found: ignore

  coverage-report:
    needs: [run-tests]
    uses: ./.github/workflows/reusable-coverage-report.yml
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    with:
      pr-number: ${{ github.event.pull_request.number != 0 && toJson(github.event.pull_request.number) || '' }}

  coverage-gate:
    name: coverage-gate
    needs: [coverage-report]
    runs-on: ubuntu-latest
    env:
      # Minimum total coverage required for the build to pass. This is a ratchet:
      # raise it over time as coverage improves, but never set it above the current
      # measured coverage or every PR will be blocked. Current main coverage ~67.0%.
      COVERAGE_THRESHOLD: "65"
    steps:
      - name: Enforce coverage threshold
        env:
          TOTAL: ${{ needs.coverage-report.outputs.total }}
        run: |
          set -euo pipefail

          echo "Measured total coverage: ${TOTAL:-<empty>}"
          echo "Required threshold:      ${COVERAGE_THRESHOLD}%"

          if [ -z "${TOTAL}" ] || [ "${TOTAL}" = "N/A" ]; then
            echo "::error::Coverage could not be measured (no coverage profiles produced). Failing the gate."
            {
              echo "### ❌ Coverage gate failed"
              echo ""
              echo "Coverage could not be measured (no coverage profiles produced)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          PCT="${TOTAL%\%}"

          if awk "BEGIN { exit !(${PCT} >= ${COVERAGE_THRESHOLD}) }"; then
            echo "::notice::Coverage ${TOTAL} meets the ${COVERAGE_THRESHOLD}% threshold."
            {
              echo "### ✅ Coverage gate passed"
              echo ""
              echo "Total coverage **${TOTAL}** ≥ required **${COVERAGE_THRESHOLD}%**."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Coverage ${TOTAL} is below the required ${COVERAGE_THRESHOLD}% threshold."
            {
              echo "### ❌ Coverage gate failed"
              echo ""
              echo "Total coverage **${TOTAL}** is below the required **${COVERAGE_THRESHOLD}%** threshold."
              echo ""
              echo "Add tests to raise coverage, or adjust \`COVERAGE_THRESHOLD\` in \`.github/workflows/ci.yml\` (with reviewer sign-off)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
